<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JTBD - Map of professions by dimensions</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffaf2;
      --ink: #1f2a2e;
      --muted: #5d6b6f;
      --line: #d9cbb3;
      --func: #d96c3f;
      --emo: #2e7d6b;
      --soc: #c8a43d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding-top: 92px;
      background: var(--bg);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
    }

    .project-nav {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: min(980px, calc(100vw - 24px));
      padding: 8px;
      display: flex;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 250, 244, 0.88);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 45px rgba(47, 34, 24, 0.12);
    }

    .project-nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 1 1 0;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .wrap {
      width: 1600px;
      margin: 0 auto;
      padding: 24px;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      background: linear-gradient(180deg, #faf5ec 0%, #f2ecdf 100%);
      border: 1px solid #e2d7c4;
    }

    .title {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 34px;
      font-weight: 700;
      fill: var(--ink);
    }

    .subtitle {
      font-size: 18px;
      fill: var(--muted);
    }

    .axis-label {
      font-size: 18px;
      font-weight: 700;
      fill: var(--ink);
    }

    .small {
      font-size: 14px;
      fill: var(--muted);
    }

    .need-box {
      rx: 18;
      stroke-width: 2;
    }

    .need-title {
      font-size: 16px;
      font-weight: 700;
      fill: var(--ink);
    }

    .job-text {
      font-size: 14px;
      fill: var(--muted);
    }

    .dot-label {
      font-size: 13px;
      font-weight: 700;
      fill: var(--ink);
    }
  </style>
</head>
<body>
  <div class="project-nav">
    <a href="../index.html">Go to root</a>
    <a href="../constellations/index.html">Idea constellations</a>
    <a href="../stories/index.html">Stories</a>
    <a href="../../jobs-to-be-done/jtbd-mapa-oficios.html">Español</a>
  </div>
  <div class="wrap">
    <svg viewBox="0 0 1600 1280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
      <title id="title">Map of professions across the three JTBD dimensions</title>
      <desc id="desc">Diagram with functional, emotional, and social axes for locating categories of professions.</desc>

      <rect x="28" y="28" width="1544" height="124" rx="32" fill="#fffaf2" stroke="#d9cbb3" stroke-width="2"/>
      <text x="60" y="82" class="title">JTBD map of professions</text>
      <text x="60" y="118" class="subtitle">Interpretive coordinates: each need is placed according to the functional, emotional, and social weight of the “job” it helps solve.</text>

      <rect x="1168" y="52" width="344" height="72" rx="24" fill="#1f2a2e"/>
      <circle cx="1198" cy="88" r="8" fill="#d96c3f"/>
      <text x="1214" y="93" style="font-size:15px; fill:#ffffff;">X = functional</text>
      <circle cx="1316" cy="88" r="8" fill="#2e7d6b"/>
      <text x="1332" y="93" style="font-size:15px; fill:#ffffff;">Y = emotional</text>
      <circle cx="1438" cy="88" r="8" fill="#c8a43d"/>
      <text x="1454" y="93" style="font-size:15px; fill:#ffffff;">size = social</text>

      <rect x="56" y="184" width="1140" height="980" rx="28" fill="#fffdf8" stroke="#d9cbb3" stroke-width="2"/>

      <g stroke="#e8decc" stroke-width="1">
        <line x1="200" y1="1020" x2="1120" y2="1020"/>
        <line x1="200" y1="840" x2="1120" y2="840"/>
        <line x1="200" y1="660" x2="1120" y2="660"/>
        <line x1="200" y1="480" x2="1120" y2="480"/>
        <line x1="200" y1="300" x2="1120" y2="300"/>
        <line x1="200" y1="1020" x2="200" y2="240"/>
        <line x1="430" y1="1020" x2="430" y2="240"/>
        <line x1="660" y1="1020" x2="660" y2="240"/>
        <line x1="890" y1="1020" x2="890" y2="240"/>
        <line x1="1120" y1="1020" x2="1120" y2="240"/>
      </g>

      <line x1="200" y1="1020" x2="1148" y2="1020" stroke="#d96c3f" stroke-width="4"/>
      <polygon points="1148,1020 1128,1010 1128,1030" fill="#d96c3f"/>
      <line x1="200" y1="1048" x2="200" y2="228" stroke="#2e7d6b" stroke-width="4"/>
      <polygon points="200,228 190,248 210,248" fill="#2e7d6b"/>

      <text x="774" y="1070" class="axis-label">Functional weight of the job</text>
      <text x="82" y="636" transform="rotate(-90 82 636)" class="axis-label">Emotional load of the job</text>

      <text x="184" y="1048" class="small">low</text>
      <text x="1090" y="1048" class="small">high</text>
      <text x="158" y="1016" class="small">low</text>
      <text x="158" y="260" class="small">high</text>

      <g>
        <circle cx="384" cy="318" r="52" fill="#e6f3ef" stroke="#2e7d6b" stroke-width="3"/>
        <text x="324" y="312" class="dot-label">Protection</text>
        <text x="311" y="332" class="dot-label">Health &amp; Care</text>
        <text x="303" y="356" class="small">Doctor, nurse, psychologist, physiotherapist...</text>
      </g>

      <g>
        <circle cx="588" cy="392" r="48" fill="#f6efdb" stroke="#c8a43d" stroke-width="3"/>
        <text x="534" y="386" class="dot-label">Connectivity</text>
        <text x="531" y="406" class="dot-label">Social belonging</text>
        <text x="498" y="430" class="small">Community manager, sociologist, coach...</text>
      </g>

      <g>
        <circle cx="882" cy="372" r="58" fill="#f6efdb" stroke="#c8a43d" stroke-width="3"/>
        <text x="832" y="366" class="dot-label">Identity</text>
        <text x="820" y="386" class="dot-label">Self-expression</text>
        <text x="780" y="410" class="small">Fashion designer, stylist, photographer...</text>
      </g>

      <g>
        <circle cx="968" cy="516" r="44" fill="#f5e7de" stroke="#d96c3f" stroke-width="3"/>
        <text x="932" y="510" class="dot-label">Leisure</text>
        <text x="899" y="530" class="dot-label">Entertainment</text>
        <text x="870" y="554" class="small">Artist, musician, actor, animator...</text>
      </g>

      <g>
        <circle cx="806" cy="618" r="40" fill="#f5e7de" stroke="#d96c3f" stroke-width="3"/>
        <text x="756" y="612" class="dot-label">Connectivity</text>
        <text x="741" y="632" class="dot-label">Remote communication</text>
        <text x="696" y="656" class="small">Programmer, networks, UX/UI, cybersecurity...</text>
      </g>

      <g>
        <circle cx="1030" cy="702" r="46" fill="#f5e7de" stroke="#d96c3f" stroke-width="3"/>
        <text x="958" y="696" class="dot-label">Mobility</text>
        <text x="924" y="716" class="dot-label">Transport of people/goods</text>
        <text x="900" y="740" class="small">Driver, pilot, mechanic, logistics...</text>
      </g>

      <g>
        <circle cx="1116" cy="856" r="42" fill="#f5e7de" stroke="#d96c3f" stroke-width="3"/>
        <text x="1048" y="850" class="dot-label">Survival</text>
        <text x="1032" y="870" class="dot-label">Nourish the body</text>
        <text x="995" y="894" class="small">Chef, farmer, fisher, nutritionist...</text>
      </g>

      <g>
        <circle cx="962" cy="934" r="34" fill="#f5e7de" stroke="#d96c3f" stroke-width="3"/>
        <text x="912" y="928" class="dot-label">Survival</text>
        <text x="920" y="948" class="dot-label">Hydrate</text>
        <text x="882" y="972" class="small">Hydrologist, plumber, barista, analyst...</text>
      </g>

      <g>
        <circle cx="710" cy="786" r="32" fill="#f5e7de" stroke="#d96c3f" stroke-width="3"/>
        <text x="628" y="780" class="dot-label">Hygiene</text>
        <text x="602" y="800" class="dot-label">Cleaning &amp; sanitation</text>
        <text x="582" y="824" class="small">Sanitation, waste, sterilization...</text>
      </g>

      <g>
        <circle cx="742" cy="540" r="36" fill="#e6f3ef" stroke="#2e7d6b" stroke-width="3"/>
        <text x="678" y="534" class="dot-label">Knowledge</text>
        <text x="652" y="554" class="dot-label">Learning &amp; education</text>
        <text x="640" y="578" class="small">Teacher, mentor, researcher, tutor...</text>
      </g>

      <g>
        <circle cx="884" cy="646" r="34" fill="#f6efdb" stroke="#c8a43d" stroke-width="3"/>
        <text x="840" y="640" class="dot-label">Economy</text>
        <text x="808" y="660" class="dot-label">Exchange of value</text>
        <text x="792" y="684" class="small">Banker, auditor, economist, treasurer...</text>
      </g>

      <g>
        <circle cx="332" cy="700" r="38" fill="#e6f3ef" stroke="#2e7d6b" stroke-width="3"/>
        <text x="282" y="694" class="dot-label">Protection</text>
        <text x="246" y="714" class="dot-label">Shelter &amp; safety</text>
        <text x="212" y="738" class="small">Architect, police officer, firefighter, locksmith...</text>
      </g>

      <rect x="1224" y="184" width="320" height="980" rx="28" fill="#fffaf2" stroke="#d9cbb3" stroke-width="2"/>
      <text x="1254" y="232" class="axis-label">How to read the map</text>
      <text x="1254" y="270" class="small">Each point summarizes a category of need,</text>
      <text x="1254" y="292" class="small">its dominant job, and associated professional families.</text>

      <rect x="1254" y="336" width="258" height="118" class="need-box" fill="#f5e7de" stroke="#d96c3f"/>
      <text x="1278" y="368" class="need-title">High functional weight</text>
      <text x="1278" y="395" class="job-text">Solve something practical, measurable,</text>
      <text x="1278" y="418" class="job-text">and urgent.</text>

      <rect x="1254" y="476" width="258" height="118" class="need-box" fill="#e6f3ef" stroke="#2e7d6b"/>
      <text x="1278" y="508" class="need-title">High emotional weight</text>
      <text x="1278" y="535" class="job-text">Reduce fear, gain calm,</text>
      <text x="1278" y="558" class="job-text">safety, or belonging.</text>

      <rect x="1254" y="616" width="258" height="118" class="need-box" fill="#f6efdb" stroke="#c8a43d"/>
      <text x="1278" y="648" class="need-title">High social weight</text>
      <text x="1278" y="675" class="job-text">Signal identity, status,</text>
      <text x="1278" y="698" class="job-text">or outside recognition.</text>

      <rect x="1254" y="776" width="258" height="174" class="need-box" fill="#fff" stroke="#d9cbb3"/>
      <text x="1278" y="808" class="need-title">Teaching key</text>
      <text x="1278" y="842" class="job-text">There are no “pure” professions.</text>
      <text x="1278" y="866" class="job-text">All of them mix the three dimensions,</text>
      <text x="1278" y="890" class="job-text">but one weighs more than the others.</text>
      <text x="1278" y="924" class="job-text">That lets students detect</text>
      <text x="1278" y="948" class="job-text">human needs behind the market.</text>

      <text x="1254" y="1012" class="axis-label">Historical → current examples</text>
      <text x="1254" y="1050" class="small">Tribal fire → social networks</text>
      <text x="1254" y="1074" class="small">Herbal medicine → telemedicine</text>
      <text x="1254" y="1098" class="small">Barter → fintech / crypto-assets</text>
      <text x="1254" y="1122" class="small">Walking / carts → drones / EVs</text>
    </svg>
  </div>
</body>
</html>
